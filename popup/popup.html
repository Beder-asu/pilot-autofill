<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; color: #FFA000;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Pilot</h2>
  </div>
  <div class="content">
    <div id="domain-name" class="domain">Forms</div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-btn);">
      <div style="font-size: 13px; font-weight: 600;">Auto-Fill Automatically</div>
      <label class="switch" style="position: relative; display: inline-block; width: 34px; height: 20px; margin: 0;">
        <input type="checkbox" id="popup-autofill-mode" style="opacity: 0; width: 0; height: 0;">
        <span class="slider round" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px;">
          <span style="position: absolute; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%;"></span>
        </span>
      </label>
    </div>

    <div id="status-text" class="status">Fields detected: 0</div>
    
    <div id="action-buttons" style="display:none; margin-top: 16px;">
      <button id="btn-fill" class="primary-btn">Fill This Page</button>
      <button id="btn-fill-all-tabs" class="success-btn">Fill All Open Tabs</button>
      <button id="btn-review" class="secondary-btn">Review Fields</button>
    </div>
    
    <button id="btn-settings" class="secondary-btn" style="margin-top: 16px;">Open Settings</button>
  </div>
  <div class="footer" id="sync-banner" style="display:none;">
    <div style="font-size: 12px; margin-bottom: 8px; color: var(--text-secondary);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; color: #FF9500;"><path d="M4 22h16"></path><path d="M12 22V10"></path><path d="M4 10a8 8 0 0 1 16 0"></path><path d="M8 10a4 4 0 0 1 8 0"></path><circle cx="12" cy="10" r="1"></circle></svg> Dataset sync: OFF</div>
    <button id="btn-enable-sync">Enable anonymous data sharing</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
