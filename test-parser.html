<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Parser Test Harness</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    #result { background: #f5f5f5; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
    input[type=file] { margin-bottom: 20px; }
    .loader { display: none; color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>Test Offline Resume Parser</h1>
  <p>Select a local PDF resume to test the offline heuristic extraction engine.</p>
  
  <input type="file" id="pdf-upload" accept="application/pdf">
  <div class="loader" id="loader">Extracting and parsing text...</div>
  
  <h3>Parsed Output (Offline Heuristics Only):</h3>
  <div id="result">Waiting for file...</div>

  <!-- Load dependencies -->
  <script src="lib/pdf.min.js"></script>
  <script src="storage/resume-parser.js"></script>
  <script>
    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      document.getElementById('loader').style.display = 'block';
      document.getElementById('result').textContent = 'Processing...';

      try {
        const buffer = await file.arrayBuffer();
        
        // We only want to test offline heuristics here, so we won't pass an API key
        // Wait, parseResume uses both, but if we don't pass API key, it only returns offline
        const profile = await globalThis.ResumeParser.parseResume(buffer, null);
        
        document.getElementById('result').textContent = JSON.stringify(profile, null, 2);
      } catch (err) {
        document.getElementById('result').textContent = 'Error: ' + err.message;
        console.error(err);
      } finally {
        document.getElementById('loader').style.display = 'none';
      }
    });
  </script>
</body>
</html>
